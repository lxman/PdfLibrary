name: Publish to NuGet

on:
  release:
    types: [published]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  publish:
    # Windows runner: the Lxman.PdfLibrary.Rendering.Wpf package targets net*-windows (WPF) and
    # cannot build on Linux. The core package (net8/9/10) builds fine on Windows too.
    runs-on: windows-latest
    permissions:
      id-token: write  # Required for NuGet trusted publishing

    defaults:
      run:
        shell: bash   # use bash (available on the Windows runner) for the sed/version steps

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Full history for Nerdbank.GitVersioning

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Extract version from tag
      id: version
      run: |
        # Remove 'v' prefix if present (v2.0.0 -> 2.0.0)
        VERSION=${GITHUB_REF_NAME#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Update package versions
      run: |
        # Update version in the SHIPPED package csproj files to match the tag.
        sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.VERSION }}</Version>|g" PdfLibrary/PdfLibrary.csproj
        sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.VERSION }}</Version>|g" PdfLibrary.Rendering.Wpf/PdfLibrary.Rendering.Wpf.csproj

    - name: Restore dependencies
      run: |
        dotnet restore PdfLibrary/PdfLibrary.csproj
        dotnet restore PdfLibrary.Rendering.Wpf/PdfLibrary.Rendering.Wpf.csproj
        dotnet restore PdfLibrary.Rendering.SkiaSharp/PdfLibrary.Rendering.SkiaSharp.csproj
        dotnet restore PdfLibrary.Tests/PdfLibrary.Tests.csproj

    - name: Build
      run: |
        dotnet build PdfLibrary/PdfLibrary.csproj --configuration Release --no-restore
        dotnet build PdfLibrary.Rendering.Wpf/PdfLibrary.Rendering.Wpf.csproj --configuration Release --no-restore
        # SkiaSharp backend is not published (sunset) but is still built — the pixel-fidelity
        # render tests rasterize through it.
        dotnet build PdfLibrary.Rendering.SkiaSharp/PdfLibrary.Rendering.SkiaSharp.csproj --configuration Release --no-restore
        dotnet build PdfLibrary.Tests/PdfLibrary.Tests.csproj --configuration Release --no-restore

    - name: Run tests
      run: dotnet test PdfLibrary.Tests/PdfLibrary.Tests.csproj --configuration Release --no-build --filter 'Category!=LocalOnly'

    - name: Pack PdfLibrary
      run: dotnet pack PdfLibrary/PdfLibrary.csproj --configuration Release --no-build --output ./nupkg

    - name: Pack PdfLibrary.Rendering.Wpf
      run: dotnet pack PdfLibrary.Rendering.Wpf/PdfLibrary.Rendering.Wpf.csproj --configuration Release --no-build --output ./nupkg

    - name: Login to NuGet (Trusted Publishing)
      id: nuget-login
      uses: nuget/login@v1
      with:
        user: lxmanget

    - name: Publish to NuGet
      run: |
        # Push each package and its .snupkg symbol package explicitly. nuget.org routes
        # the .snupkg to the symbol server automatically when pushed to the same source.
        dotnet nuget push "./nupkg/Lxman.PdfLibrary.${{ steps.version.outputs.VERSION }}.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push "./nupkg/Lxman.PdfLibrary.${{ steps.version.outputs.VERSION }}.snupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push "./nupkg/Lxman.PdfLibrary.Rendering.Wpf.${{ steps.version.outputs.VERSION }}.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        dotnet nuget push "./nupkg/Lxman.PdfLibrary.Rendering.Wpf.${{ steps.version.outputs.VERSION }}.snupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
